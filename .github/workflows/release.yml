name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  release:
    name: Build GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the tagged revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install the pinned toolchain
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4
        with:
          version: 2026.6.14
          cache: true
      - name: Install locked dependencies
        run: mise run sync
      - name: Verify the tagged source
        run: |
          test "$(mise run version)" = "${GITHUB_REF_NAME#v}"
          mise run check
          mise run test
          mise run test:gui
      - name: Build Python distributions
        run: mise run python:release
      - name: Publish the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh release create "$GITHUB_REF_NAME"
          dist/*.whl
          dist/*.tar.gz
          --verify-tag
          --generate-notes
          --title "Scenevis $GITHUB_REF_NAME"
