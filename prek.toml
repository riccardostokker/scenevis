default_install_hook_types = ["pre-commit", "commit-msg"]
default_stages = ["pre-commit"]

[[repos]]
repo = "builtin"
hooks = [
    { id = "check-added-large-files", args = ["--maxkb=1024"], exclude = '^tests/fixtures/canon_eos_200d/.*\.(?:CR2|JPG)$' },
    { id = "check-case-conflict" },
    { id = "check-json" },
    { id = "check-merge-conflict" },
    { id = "check-toml" },
    { id = "check-yaml" },
    { id = "detect-private-key" },
    { id = "end-of-file-fixer" },
    { id = "mixed-line-ending", args = ["--fix=lf"] },
    { id = "trailing-whitespace" },
]

[[repos]]
repo = "local"

[[repos.hooks]]
id = "check"
name = "mise check"
entry = "mise run check"
language = "system"
pass_filenames = false
always_run = true
require_serial = true

[[repos.hooks]]
id = "test"
name = "mise test"
entry = "mise run test"
language = "system"
pass_filenames = false
always_run = true
require_serial = true

[[repos.hooks]]
id = "conventional-commit"
name = "conventional commit"
entry = "uv run --no-sync python scripts/validate_commit_msg.py"
language = "system"
stages = ["commit-msg"]
pass_filenames = true
