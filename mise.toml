[tools]
python = "3.14.6"
uv = "0.11.29"
prek = "0.4.10"
git-cliff = "2.13.1"
node = "24"
pnpm = "11"
gitleaks = "8.30.1"

[settings]
python.uv_venv_auto = true

[env]
UV_PROJECT_ENVIRONMENT = ".venv"
UV_PYTHON = "3.14.6"

[tasks.sync]
description = "Install or refresh the locked development environment."
run = [
    "uv sync --locked",
    "pnpm --dir app install --frozen-lockfile",
]

[tasks.install]
description = "Alias for sync."
depends = ["sync"]

[tasks.format]
description = "Check formatting without rewriting files."
run = [
    "uv run --no-sync ruff format --check src tests scripts",
    "pnpm --dir app format",
]

[tasks."format:fix"]
description = "Rewrite Python formatting."
run = [
    "uv run --no-sync ruff format src tests scripts",
    "pnpm --dir app format:fix",
]

[tasks.lint]
description = "Run Ruff lint checks."
run = [
    "uv run --no-sync ruff check src tests scripts",
    "pnpm --dir app lint",
]

[tasks."lint:fix"]
description = "Apply Ruff fixes and then format changes."
run = [
    "uv run --no-sync ruff check --fix src tests scripts",
    "pnpm --dir app lint:fix",
    "mise run format:fix",
]

[tasks.typecheck]
description = "Run static type checks with ty."
run = [
    "uv run --no-sync ty check src tests scripts",
    "pnpm --dir app typecheck",
]

[tasks.test]
description = "Run Python tests."
run = "uv run --no-sync pytest"

[tasks."test:gui"]
description = "Run frontend unit and component tests."
run = "pnpm --dir app test"

[tasks."test:gui:e2e"]
description = "Run the browser analysis and export journey."
run = "pnpm --dir app exec playwright test"

[tasks."test:fixtures"]
description = "Run full-resolution Canon camera fixture tests."
run = "uv run --no-sync pytest -m camera_fixture"

[tasks."contract:check"]
description = "Verify OpenAPI and generated frontend types are current."
run = "uv run --no-sync python scripts/check_contract.py"

[tasks."contract:sync"]
description = "Regenerate OpenAPI and frontend API types."
run = [
    "uv run --no-sync python scripts/export_openapi.py",
    "pnpm --dir app contract:sync",
]

[tasks.check]
description = "Run the fast read-only validation aggregate."
depends = ["version:check", "contract:check", "format", "lint", "typecheck"]

[tasks.audit]
description = "Audit repository history and locked dependencies."
run = [
    "gitleaks git --redact --no-banner .",
    "uv run --no-sync pip-audit",
    "pnpm --dir app audit --audit-level high",
]

[tasks.dev]
description = "Run the local API and Vite application with reload."
run = "uv run --no-sync python scripts/dev.py"

[tasks."build:gui"]
description = "Build the browser application into the Python package."
run = "pnpm --dir app build"

[tasks."browser:install"]
description = "Install Chromium and its system dependencies for browser tests."
run = "pnpm --dir app exec playwright install --with-deps chromium"

[tasks."build:dev"]
description = "Build the complete local application."
depends = ["build:gui"]

[tasks.hooks]
description = "Run all prek hooks on all files."
run = "prek run --all-files"

[tasks."hooks:install"]
description = "Install and prepare repository Git hooks."
run = "prek install --prepare-hooks"

[tasks."hooks:run"]
description = "Run all prek hooks on all files."
depends = ["hooks"]

[tasks.version]
description = "Print the effective package version for the current Git state."
run = "uv run --no-sync python scripts/version.py --field version"

[tasks."version:check"]
description = "Verify committed version metadata and the lockfile without rewriting files."
run = [
    "uv run --no-sync python scripts/check_version.py",
    "uv lock --check",
    "pnpm --dir app install --frozen-lockfile --lockfile-only",
]

[tasks."version:sync"]
description = "Update version metadata and the lockfile without committing."
run = "uv run --no-sync python scripts/stamp_version.py"

[tasks."version:release"]
description = "Prepare a release commit and local tag without pushing."
run = "uv run --no-sync python scripts/version_workflow.py release"

[tasks."changelog:preview"]
description = "Preview the unreleased Conventional Commit changelog."
run = "git-cliff --unreleased --strip all"

[tasks."python:release"]
description = "Build wheel and source distribution artifacts."
run = [
    "mise run build:gui",
    "uv build",
]
